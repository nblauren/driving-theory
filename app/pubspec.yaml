name: driving_theory
description: "German Driving Theory Learning App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  path: ^1.9.0
  video_player: ^2.9.2
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.4
  flutter_tts: ^4.2.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  confetti: ^0.8.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/driving_theory_questions.json
    - assets/driving_theory_questions_de.json
    - assets/images/
    - assets/videos/
    - assets/sounds/
